<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>

    <title>Welcome to Machala Member Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          crossorigin="anonymous">

    <link rel="stylesheet"
          th:href="@{/css/login.css}"
          href="/css/login.css"/>
</head>

<body>

<main class="login-page d-flex align-items-center justify-content-center min-vh-100">

    <div class="card login-card shadow-sm">

        <div class="card-body p-4">

            <!-- LOGO / TITLE -->
            <div class="text-center mb-3 brand-area">

                <img th:src="@{/images/logo.png}"
                     src="/images/logo.png"
                     alt="Machala logo"
                     class="brand-logo"/>

                <h2 class="card-title mt-2 mb-0">
                    Machala
                </h2>

                <p class="text-muted small">
                    Member portal
                </p>

            </div>


            <!-- LOGIN ERROR MESSAGE -->
            <div th:if="${loginError != null}"
                 class="alert alert-danger"
                 role="alert"
                 th:text="${loginError}">
            </div>


            <!-- LOGOUT MESSAGE -->
            <div th:if="${logoutParam}"
                 class="alert alert-success"
                 role="alert">
                You have been logged out successfully.
            </div>


            <!-- REGISTRATION MESSAGE -->
            <div th:if="${registered}"
                 class="alert alert-success"
                 role="alert">
                Registration successful. Please login.
            </div>



            <!-- LOGIN FORM -->
            <form th:action="@{/login}"
                  method="post">


                <!-- CSRF TOKEN -->
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>



                <!-- USERNAME -->
                <div class="mb-3">

                    <label for="username"
                           class="form-label">
                        Username
                    </label>


                    <input id="username"
                           name="username"
                           type="text"
                           class="form-control form-control-lg"
                           placeholder="Enter your username"
                           th:value="${lastUsername}"
                           required
                           autocomplete="username"/>

                </div>




                <!-- PASSWORD -->
                <div class="mb-3">

                    <label for="password"
                           class="form-label">
                        Password
                    </label>


                    <div class="input-group">

                        <input id="password"
                               name="password"
                               type="password"
                               class="form-control form-control-lg"
                               placeholder="Enter your password"
                               required
                               autocomplete="current-password"/>


                        <button class="btn btn-outline-secondary"
                                type="button"
                                id="togglePassword">

                            Show

                        </button>

                    </div>

                </div>





                <!-- REMEMBER ME / FORGOT -->
                <div class="d-flex justify-content-between align-items-center mb-3">

                    <div class="form-check">

                        <input class="form-check-input"
                               type="checkbox"
                               id="remember"
                               name="remember-me"/>


                        <label class="form-check-label"
                               for="remember">

                            Remember me

                        </label>

                    </div>


                    <a href="#"
                       class="small text-decoration-none">

                        Forgot password?

                    </a>

                </div>





                <!-- LOGIN BUTTON -->
                <div class="d-grid mb-3">

                    <button type="submit"
                            class="btn btn-primary btn-lg btn-orange">

                        Sign in

                    </button>

                </div>


            </form>





            <hr/>





            <!-- REGISTER LINK -->
            <div class="text-center small text-muted">

                New here?

                <a th:href="@{/register}"
                   href="/register">

                    Create an account

                </a>

            </div>


        </div>

    </div>


</main>





<script>

document
.getElementById("togglePassword")
.addEventListener("click", function () {

    const password =
        document.getElementById("password");


    if (password.type === "password") {

        password.type = "text";
        this.innerText = "Hide";

    } else {

        password.type = "password";
        this.innerText = "Show";

    }

});

</script>


</body>

</html>
