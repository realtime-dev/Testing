<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Welcome to ,machala member portal</title>

  <!-- Bootstrap (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-Tm1QGQ9m2e+3cXqz1F1u4k3x2+8u5M2q5Jt6oJb6dR6x3p1T2Q9k7s4m6N8vZx2" crossorigin="anonymous">

  <!-- Custom styles -->
  <link rel="stylesheet" th:href="@{/css/login.css}" href="/css/login.css" />
</head>
<body>
  <main class="login-page d-flex align-items-center justify-content-center min-vh-100">
    <div class="card login-card shadow-sm">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <h2 class="card-title mb-1">,machala</h2>
          <p class="text-muted small">Member portal</p>
        </div>

        <form th:action="@{/login}" method="post" class="needs-validation" novalidate>
          <!-- CSRF token -->
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input id="username" name="username" type="text" class="form-control form-control-lg"
                   placeholder="Enter your username" required autofocus autocomplete="username" />
          </div>

          <div class="mb-3 position-relative">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <input id="password" name="password" type="password" class="form-control form-control-lg"
                     placeholder="Enter your password" required autocomplete="current-password" />
              <button class="btn btn-outline-secondary btn-toggle" type="button" aria-label="Toggle password">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor"
                     class="bi bi-eye" viewBox="0 0 16 16">
                  <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8z"/>
                  <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5z" fill="#fff"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="remember" name="remember-me" />
              <label class="form-check-label" for="remember">Remember me</label>
            </div>
            <a href="#" class="small text-decoration-none">Forgot?</a>
          </div>

          <div class="d-grid mb-3">
            <button type="submit" class="btn btn-primary btn-lg">Sign in</button>
          </div>

          <!-- Feedback messages from Spring Security -->
          <div th:if="${param.error}" class="alert alert-danger small mb-2" role="alert">
            Invalid username or password.
          </div>
          <div th:if="${param.logout}" class="alert alert-success small mb-2" role="alert">
            You have been logged out.
          </div>
          <div th:if="${param.registered}" class="alert alert-success small mb-2" role="alert">
            Registration successful — please log in.
          </div>
          <div th:if="${error != null}" class="alert alert-danger small mt-2" role="alert" th:text="${error}"></div>
        </form>

        <hr />

        <div class="text-center small text-muted">
          New here? <a th:href="@{/register}" href="/register">Create an account</a>
        </div>
      </div>
    </div>
  </main>

  <!-- Small JS for password toggle; does NOT intercept form submit -->
  <script>
    document.addEventListener('click', function (e) {
      if (!e.target.closest('.btn-toggle')) return;
      const btn = e.target.closest('.btn-toggle');
      const group = btn.closest('.input-group');
      const input = group && group.querySelector('input[type="password"], input[type="text"]');
      if (!input) return;
      if (input.type === 'password') {
        input.type = 'text';
        btn.classList.add('active');
      } else {
        input.type = 'password';
        btn.classList.remove('active');
      }
    }, false);

    // Simple validation visual cue (does not stop submit if valid)
    (function () {
      'use strict'
      const forms = document.querySelectorAll('.needs-validation')
      Array.prototype.slice.call(forms).forEach(function (form) {
        form.addEventListener('submit', function (event) {
          if (!form.checkValidity()) {
            form.classList.add('was-validated')
          }
        }, false)
      })
    })();
  </script>
</body>
</html>
