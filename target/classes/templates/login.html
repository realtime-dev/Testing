<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Login</title></head>
<body>
  <h2>Login</h2>
  <form method="post" action="/login">
    <div><label>Username: <input name="username"/></label></div>
    <div><label>Password: <input name="password" type="password"/></label></div>
    <div><button type="submit">Login</button></div>
  </form>
  <p><a href="/register">Register</a></p>
  <p th:if="${param.logout}">You have been logged out.</p>
  <p th:if="${param.registered}">Registration successful — please log in.</p>
</body>
</html>
